name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
      - name: Build Hazel + strict tests (warnings as errors)
        run: lake build Hazel HazelTest --wfail
      - name: Build header fixtures (warnings expected)
        run: lake build HazelTestFixtures
      - name: lake test (header-fixture diff)
        run: lake test
