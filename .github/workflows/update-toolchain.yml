name: Update Dependencies

on:
  schedule:
    - cron: '0 8 */2 * *'  # Every 2 days at 08:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: leanprover-community/lean-update@main
        with:
          on_update_succeeds: pr
          on_update_fails: issue
